name: reset-all

# 전체 데이터 초기화 (1회성)
# transactions + historical_peaks DB 전체 삭제 + R2 버킷 전체 삭제
#
# 실행 후 fetch-peaks-schedule 워크플로를 샤드 1~5 수동 dispatch해야 함.
# 샤드 6~8은 기존 일정(2026-06-06~08 KST)에 자동 실행됨.
#
# ⚠️  주의: 이 워크플로는 모든 데이터를 영구 삭제합니다.

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: DB + R2 전체 초기화
        run: npx tsx scripts/clear.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
