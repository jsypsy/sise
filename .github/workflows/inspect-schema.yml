# MOLIT 매매 API(RTMSDataSvcAptTradeDev) 첫 item의 전체 필드를 덤프한다.
# 거래동(건물동) 등 우리가 안 받는 필드가 응답에 있는지 확인용(읽기 전용).
name: inspect-schema (read-only)

on:
  workflow_dispatch:
    inputs:
      sgg:
        description: '시군구 코드 (예: 11740)'
        required: true
        default: '11740'
      ym:
        description: '계약년월 YYYYMM (예: 202605)'
        required: true
        default: '202605'

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: 매매 API 전체 필드 덤프
        env:
          MOLIT_KEY: ${{ secrets.MOLIT_SERVICE_KEY }}
          SGG: ${{ inputs.sgg }}
          YM: ${{ inputs.ym }}
        run: |
          python3 - <<'PY'
          import os, urllib.parse, urllib.request, xml.etree.ElementTree as ET
          key=os.environ["MOLIT_KEY"]; sgg=os.environ["SGG"]; ym=os.environ["YM"]
          ep="https://apis.data.go.kr/1613000/RTMSDataSvcAptTradeDev/getRTMSDataSvcAptTradeDev"
          q=urllib.parse.urlencode({"serviceKey":key,"LAWD_CD":sgg,"DEAL_YMD":ym,"pageNo":"1","numOfRows":"1000"})
          root=ET.fromstring(urllib.request.urlopen(ep+"?"+q,timeout=30).read())
          print("resultCode:", root.findtext(".//resultCode"))
          items=list(root.iter("item"))
          print("item 수:", len(items))
          # 채움율: aptDong(거래동), rgstDate(등기일자)
          def nonempty(tag): return sum(1 for it in items if (it.findtext(tag) or "").strip())
          n=len(items) or 1
          for tag in ["aptDong","rgstDate"]:
              c=nonempty(tag); print(f"  [채움율] {tag}: {c}/{len(items)} ({100*c//n}%)")
          # 실제 aptDong 비어있지 않은 샘플 + 단지별 채움 편차(단지에 따라 다를 수 있음)
          samp=[(it.findtext('aptNm') or '', (it.findtext('aptDong') or '').strip()) for it in items if (it.findtext('aptDong') or '').strip()]
          print("  [aptDong 채워진 샘플 8]", samp[:8])
          from collections import Counter
          bydong=Counter((it.findtext('aptNm') or '') for it in items if (it.findtext('aptDong') or '').strip())
          bytot=Counter(it.findtext('aptNm') or '' for it in items)
          print("  [단지별] 동이 채워진 단지 수:", len(bydong), "/ 전체 단지:", len(bytot))
          # 교차: 동 ↔ 등기 상관관계
          d=lambda it:(it.findtext('aptDong') or '').strip(); r=lambda it:(it.findtext('rgstDate') or '').strip()
          both=sum(1 for it in items if d(it) and r(it))
          dong_only=sum(1 for it in items if d(it) and not r(it))
          rgst_only=sum(1 for it in items if r(it) and not d(it))
          print(f"  [교차] 동+등기 둘다:{both}  동만:{dong_only}  등기만:{rgst_only}  (동 있는데 등기 없는 게 0이면 = 동은 등기완료분만)")
          # 모든 item의 태그 합집합(어떤 item에만 있는 필드도 포착)
          tags=set()
          for it in items:
              for c in it: tags.add(c.tag)
          print("\n[전체 필드 목록]")
          for t in sorted(tags): print("   -", t)
          # 동/건물 관련 필드 하이라이트
          hits=[t for t in tags if any(k in t.lower() for k in ["dong","bun","road","호","동"]) or "dong" in t.lower()]
          print("\n[동/번지/도로 관련 후보]", hits or "(없음)")
          print("\n[첫 item 값]")
          for c in items[0]:
              print(f"   <{c.tag}> = {(c.text or '').strip()}")
          PY
