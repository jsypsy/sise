name: bootstrap

on:
  workflow_dispatch:  # 수동 1회 실행 — DB 리셋 후 전체 재적재

jobs:
  reset-and-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: DB 초기화 (transactions truncate + signals_mv 리셋)
        run: npx tsx scripts/bootstrap.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 202605 실거래가 수집 + historical_peaks 동기화
        run: npx tsx scripts/ingest.ts --ym=202605
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MOLIT_SERVICE_KEY: ${{ secrets.MOLIT_SERVICE_KEY }}

  # fetch-peaks는 일일 API quota(10,000콜) 한계로 3년씩 나눠 실행.
  # fetch_peaks.yml 워크플로우를 직접 실행: 200601-200912 / 201001-201312 / 201401-201712 / 201801-202112 / 202201-현재전달
