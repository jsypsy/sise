name: bootstrap

on:
  workflow_dispatch:  # 수동 1회 실행 — DB 리셋 후 전체 재적재

jobs:
  reset-and-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: DB 초기화 (transactions truncate + signals_mv 리셋)
        run: npx tsx scripts/bootstrap.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 202605 실거래가 수집 + historical_peaks 동기화
        run: npx tsx scripts/ingest.ts --ym=202605
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MOLIT_SERVICE_KEY: ${{ secrets.MOLIT_SERVICE_KEY }}

  fetch-peaks:
    needs: [reset-and-ingest]
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: 역대 최고가 수집 (200601~202604)
        run: npx tsx scripts/fetch_peaks.ts --from=200601 --to=202604
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MOLIT_SERVICE_KEY: ${{ secrets.MOLIT_SERVICE_KEY }}

      - name: ISR 재검증
        run: |
          curl -sf -X POST "https://sise-ten.vercel.app/api/revalidate?secret=${{ secrets.REVALIDATE_SECRET }}" || true
