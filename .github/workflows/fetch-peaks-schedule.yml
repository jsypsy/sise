name: fetch-peaks-schedule

# 전국 단지별 실거래 원본을 지역 8등분(샤드)으로 나눠 하루 1샤드씩 수집한다.
# 각 샤드는 자기 지역의 2006~현재 전 기간을 끝내므로 단지 파일이 한 번에 완성된다(merge 불필요).
# 일일 quota(10,000콜): 1샤드 ≈ 31지역 × ~244개월 ≈ 9,000콜 + 매일 ingest ~250콜 < 10,000.
# 완료 시 결과를 이메일로 발송한다(성공/실패 모두).
on:
  schedule:
    - cron: "0 22 31 5 *"    # UTC 2026-05-31 22:00 = KST 06-01 07:00  → 샤드 1
    - cron: "0 22 1-7 6 *"   # UTC 2026-06-01~07 22:00 = KST 06-02~08 07:00 → 샤드 2~8
  workflow_dispatch:
    inputs:
      shard:
        description: '샤드 번호 (1~8). 비워두면 오늘 날짜로 자동 결정'
        required: false
        default: ''

jobs:
  fetch-peaks-shard:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: 샤드 결정 및 실행
        id: run
        run: |
          SHARD="${{ inputs.shard }}"
          if [ -z "$SHARD" ]; then
            DATE=$(date -u +%Y-%m-%d)
            case $DATE in
              "2026-05-31") SHARD=1 ;;
              "2026-06-01") SHARD=2 ;;
              "2026-06-02") SHARD=3 ;;
              "2026-06-03") SHARD=4 ;;
              "2026-06-04") SHARD=5 ;;
              "2026-06-05") SHARD=6 ;;
              "2026-06-06") SHARD=7 ;;
              "2026-06-07") SHARD=8 ;;
              *) echo "오늘($DATE)은 예정된 샤드 없음. 종료."; echo "shard=none" >> "$GITHUB_OUTPUT"; exit 0 ;;
            esac
          fi
          echo "shard=$SHARD" >> "$GITHUB_OUTPUT"
          echo "샤드 $SHARD / 8 실행"
          npx tsx scripts/fetch_peaks.ts --shard=$SHARD --shards=8 2>&1 | tee /tmp/run.log
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MOLIT_SERVICE_KEY: ${{ secrets.MOLIT_SERVICE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: ISR 재검증
        if: success()
        run: |
          curl -sf -X POST "https://sise-ten.vercel.app/api/revalidate?secret=${{ secrets.REVALIDATE_SECRET }}" || true

      - name: 결과 요약 추출
        if: always()
        id: sum
        run: |
          if [ -f /tmp/run.log ]; then
            S=$(grep -E "수집 완료|업로드 완료|용량측정|preflight|resultCode=22" /tmp/run.log | tail -10 || true)
            [ -z "$S" ] && S="(요약 라인 없음 — 로그 링크 확인)"
          else
            S="로그 파일 없음 (수집 시작 전 실패)"
          fi
          {
            echo "text<<__EOF__"
            echo "$S"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: 결과 이메일 발송
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[sise] fetch-peaks 샤드 ${{ steps.run.outputs.shard }} — ${{ job.status }}"
          to: ${{ secrets.MAIL_TO }}
          from: sise GitHub Actions <${{ secrets.MAIL_USERNAME }}>
          body: |
            sise 단지별 실거래 백필 결과

            샤드:  ${{ steps.run.outputs.shard }} / 8
            상태:  ${{ job.status }}

            ── 요약 ──────────────────────
            ${{ steps.sum.outputs.text }}

            실행 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
