name: fetch-peaks-schedule

# 전국 단지별 실거래 원본을 지역 8등분(샤드)으로 나눠 하루 1샤드씩 수집한다.
# 각 샤드는 자기 지역의 2006~현재 전 기간을 끝내므로 단지 파일이 한 번에 완성된다(merge 불필요).
# 수동 실행 시 shard=(epoch일 mod 8)+1 자동 결정(또는 입력). 자동 스케줄은 비용 문제로 제거됨(아래 on: 참고).
# 일일 quota(10,000콜): 1샤드 ≈ 31지역 × ~244개월 ≈ 9,000콜 + 매일 ingest ~250콜 < 10,000.
# 실패 시 GitHub이 레포 주인에게 자동 이메일을 보낸다(Vercel 배포 실패 알림과 동일, 설정 불필요).
on:
  # ⚠️ 스케줄 제거(2026-06-13): fetch_peaks 1회 = 2006~현재 전체 재적재라 ~70분/run.
  #    매일 돌리면 GitHub Actions 월 2,000분 무료 한도를 초과(과금)한다.
  #    R2 갱신은 '점진 수집'(최근 N개월만 받아 기존 R2에 병합)으로 대체 예정.
  #    그때까지는 필요할 때만 아래 workflow_dispatch로 수동 실행.
  workflow_dispatch:
    inputs:
      shard:
        description: '샤드 번호 (1~8). 비워두면 오늘 날짜로 자동 결정'
        required: false
        default: ''

jobs:
  fetch-peaks-shard:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: 샤드 결정 및 실행
        run: |
          SHARD="${{ inputs.shard }}"
          if [ -z "$SHARD" ]; then
            # epoch 일수 기준 8일 주기 순환 → 끊김 없이 매 지역을 8일마다 재적재
            DAYS=$(( $(date -u +%s) / 86400 ))
            SHARD=$(( DAYS % 8 + 1 ))
          fi
          echo "샤드 $SHARD / 8 실행 (UTC $(date -u +%F))"
          npx tsx scripts/fetch_peaks.ts --shard=$SHARD --shards=8
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MOLIT_SERVICE_KEY: ${{ secrets.MOLIT_SERVICE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: ISR 재검증
        if: success()
        run: |
          curl -sf -X POST "https://sise-ten.vercel.app/api/revalidate?secret=${{ secrets.REVALIDATE_SECRET }}" || true
