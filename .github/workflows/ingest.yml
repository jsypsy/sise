name: ingest

on:
  schedule:
    - cron: "10 19 * * *"   # KST 04:10 = UTC 19:10
  workflow_dispatch:
    inputs:
      ym:
        description: '수집 년월 (YYYYMM). 비워두면 당월 자동'
        required: false
        default: ''

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: 실거래가 수집
        run: npx tsx scripts/ingest.ts ${{ inputs.ym != '' && format('--ym={0}', inputs.ym) || '' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MOLIT_SERVICE_KEY: ${{ secrets.MOLIT_SERVICE_KEY }}

      - name: ISR 재검증
        run: |
          curl -sf -X POST "https://sise-ten.vercel.app/api/revalidate?secret=${{ secrets.REVALIDATE_SECRET }}" || true
