# 새(서울) Supabase 상태를 읽기 전용으로 점검해 로그에 출력한다.
# hp/시그널 재구축 후 정상 여부 확인용. 쓰기 없음(SELECT만).
name: db-verify (read-only)

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnostics
        run: |
          DB="${{ secrets.NEW_DB_URL }}"
          echo "── historical_peaks ──"
          psql "$DB" -c "select count(*) as peak_rows, count(*) filter (where umd_nm='') as null_umd_rows from historical_peaks;"
          echo "── signals_mv 전체 / 최근7일 신고가·반등 ──"
          psql "$DB" -c "select count(*) as mv_rows from signals_mv;"
          psql "$DB" -c "select count(*) filter (where is_high) as highs7, count(*) filter (where is_rebound) as rebounds7 from signals_mv where first_seen >= current_date - 7;"
          echo "── 동명단지 spot-check: 진주(48170) 현대 hp, 동별 ──"
          psql "$DB" -c "select umd_nm, pyeong, peak_price, peak_date from historical_peaks where sgg_cd='48170' and apt_nm='현대' order by umd_nm, pyeong;"
          echo "── 같은 단지 signals_mv 신고가 분포(동별로 갈리는지) ──"
          psql "$DB" -c "select umd_nm, count(*) as tx, count(*) filter (where is_high) as highs from signals_mv where sgg_cd='48170' and apt_nm='현대' group by umd_nm order by umd_nm;"
